name: Daily contribution

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Random Commits
        run: |
          git config --global user.name "Izzlan Anuar"
          git config --global user.email "eizlan09@gmail.com"
          
          NUM_COMMITS=$(( ( RANDOM % 7 ) + 1 ))
          echo "Making $NUM_COMMITS commits today..."
          
          for i in $(seq 1 $NUM_COMMITS)
          do
            echo "Contribution #$i on $(date)" > last_contribution.txt
            git add last_contribution.txt
            git commit -m "chore: daily contribution $i/7 [skip ci]"
          done
          
          git push
