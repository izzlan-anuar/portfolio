name: Daily contribution

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update last_updated.txt
        run: |
          echo "Last updated on $(date)" > last_contribution.txt

      - name: Commit and Push
        run: |
          git config --global user.name "Izzlan Anuar"
          git config --global user.email "eizlan09@gmail.com"
          git add last_contribution.txt
          git commit -m "chore: daily contribution [skip ci]" || echo "No changes to commit"
          git push
